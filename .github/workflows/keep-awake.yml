name: Keep Streamlit Awake

# Pings the Streamlit app on a schedule so it doesn't hibernate.
# Streamlit Community Cloud puts apps to sleep after ~7 days of inactivity.
# A regular ping resets that timer.

on:
  schedule:
    # Runs at 9 AM Eastern Time, year-round.
    # GitHub Actions uses UTC and doesn't auto-adjust for daylight saving,
    # so we schedule both 13:00 UTC (9 AM EDT, summer) and 14:00 UTC (9 AM EST, winter).
    # One of the two will hit at 9 AM your time; the other runs at 8 AM and is a harmless extra ping.
    - cron: '0 13 * * *'   # 9 AM EDT (Mar–Nov)
    - cron: '0 14 * * *'   # 9 AM EST (Nov–Mar)
  # Lets you trigger it manually from the Actions tab too
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging Streamlit app to keep it awake..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STREAMLIT_URL }}")
          echo "Response code: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 400 ]; then
            echo "✅ App is awake (HTTP $response)"
          else
            echo "⚠️ Unexpected response (HTTP $response) — app may still be waking up"
          fi
